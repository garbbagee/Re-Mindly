<ion-content>
  <div class="container">
    <h1 class="title">Re-Mindly</h1>
    <p class="subtitle">Organiza tu día y mejora tu concentración</p>

    <form (ngSubmit)="register()" class="form-container">
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email" name="email" required></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="password" name="password" required></ion-input>
      </ion-item>

      <ion-button expand="block" type="submit" class="register-btn">Registrar</ion-button>
    </form>
  </div>
</ion-content>
